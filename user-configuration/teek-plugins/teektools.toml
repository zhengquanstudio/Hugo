[teekTools]
version = '1.0'

[teekTools.analysis]
chineseWordsPerMin = 300
enabled = true
englishWordsPerMin = 160
excludeDirs = ['.git', '.hg', '.svn', '.DS_Store', 'node_modules', 'dist', 'public', 'resources']
outputFile = 'hugo-teek-site/data/docAnalysis.json'

[teekTools.build]
continueOnError = false
parallel = false
steps = ['frontmatter', 'permalink', 'sidebar', 'index', 'convert', 'analysis']

[teekTools.convert]
enabled = true
outputDir = 'hugo-teek-site/.content-vp-converted'
smartMode = true

[teekTools.frontend]
apiBase = 'http://localhost:8888/api/v1'
fetchTimeout = 5000

[teekTools.frontmatter]
coverImages = 'hugo-teek-site/data/coverImages.json'
enabled = true

[teekTools.index]
autoGenerate = true
enabled = true
minimalMode = true
overwriteExisting = true

[teekTools.logging]
color = true
format = 'text'
level = 'info'
showTimestamp = false

[teekTools.paths]
contentDocsAdditional = []

[teekTools.permalink]
defaultPrefix = '/docs'
enabled = true
idLength = 5
namespace = '1b671a64-40d5-491e-99b0-da01ff1f3341'

[teekTools.server]
host = '0.0.0.0'
port = 8888

[teekTools.sidebar]
defaultWeight = 50
enabled = true
extractFromPrefix = true
outputFile = 'hugo-teek-site/data/sidebarOrder.json'
splitByCategory = true
splitOutput = true

[teekTools.wechatUnlock]
enabled = true
outputFilename = 'content.json'
removeLockedContent = true
salt = 'hugo-teek-unlock-2025'
