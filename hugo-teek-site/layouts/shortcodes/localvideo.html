{{- $src := .Get "src" | default (.Inner | plainify | trim) -}}
{{- $poster := .Get "poster" | default "" -}}
{{- $title := .Get "title" | default "" -}}

<!-- 🎬 本地视频播放器 - 使用 Plyr -->
<div class="tk-local-video-container">
  <div class="tk-video-wrapper">
    <video
      class="tk-plyr-video"
      src="{{ $src }}"
      {{ if ne $poster "" }}poster="{{ $poster }}"{{ end }}
      {{ if ne $title "" }}title="{{ $title }}"{{ end }}
      playsinline
      controls
    >
      <source src="{{ $src }}" type="video/mp4">
      <!-- ⚠️ 浏览器不支持视频标签时的提示 -->
      您的浏览器不支持视频播放，请升级浏览器或更换浏览器试试~
    </video>
  </div>
</div>

<!-- 🎨 Plyr CSS 样式 - 异步加载 -->
<link rel="preload" href="https://cdn.plyr.io/3.7.8/plyr.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"></noscript>

<!-- 🚀 Plyr JS 脚本 - 异步加载 -->
<script>
  // 异步加载 Plyr 脚本
  (function() {
    if (window.Plyr) {
      // Plyr 已加载，直接初始化
      initPlyrPlayer();
      return;
    }
    
    var script = document.createElement('script');
    script.src = 'https://cdn.plyr.io/3.7.8/plyr.polyfilled.js';
    script.async = true;
    script.onload = function() {
      console.log('[Plyr] 视频播放器库加载完成');
      initPlyrPlayer();
    };
    script.onerror = function() {
      console.error('[Plyr] 视频播放器库加载失败');
    };
    document.head.appendChild(script);
  })();
  
  // 初始化 Plyr 播放器
  function initPlyrPlayer() {
    if (typeof Plyr === 'undefined') {
      console.warn('[Plyr] Plyr 库未定义，无法初始化播放器');
      return;
    }
    
    // 🎯 初始化 Plyr 播放器
    const player = new Plyr('.tk-plyr-video', {
      // 🎮 控制栏显示的按钮
      controls: [
        'play-large',      // ▶️ 大播放按钮（中央）
        'play',            // ▶️ 播放/暂停按钮
        'progress',        // 📊 进度条
        'current-time',    // ⏱️ 当前时间
        'duration',        // ⏱️ 总时长
        'mute',            // 🔇 静音按钮
        'volume',          // 🔊 音量滑块
        'captions',        // 📝 字幕按钮
        'settings',        // ⚙️ 设置按钮（播放速度、画质等）
        'pip',             // 🖼️ 画中画按钮
        'airplay',         // 📡 AirPlay 按钮
        'fullscreen'       // 🖥️ 全屏按钮
      ],
      // ⚙️ 设置菜单选项
      settings: ['captions', 'quality', 'speed', 'loop'],
      // 🚀 播放速度选项
      speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
      // 🌐 中文本地化
      i18n: {
        restart: '重新开始',
        rewind: '后退 {seektime} 秒',
        play: '播放',
        pause: '暂停',
        fastForward: '前进 {seektime} 秒',
        seek: '拖动',
        seekLabel: '{currentTime} / {duration}',
        played: '已播放',
        buffered: '已缓冲',
        currentTime: '当前时间',
        duration: '总时长',
        volume: '音量',
        mute: '静音',
        unmute: '取消静音',
        enableCaptions: '启用字幕',
        disableCaptions: '禁用字幕',
        download: '下载',
        enterFullscreen: '进入全屏',
        exitFullscreen: '退出全屏',
        frameTitle: '播放器 - {title}',
        captions: '字幕',
        settings: '设置',
        pip: '画中画',
        menuBack: '返回上级菜单',
        speed: '播放速度',
        normal: '正常',
        quality: '画质',
        loop: '循环播放',
        start: '开始',
        end: '结束',
        all: '全部',
        reset: '重置',
        disabled: '禁用',
        enabled: '启用',
        advertisement: '广告',
        qualityBadge: {
          2160: '4K',
          1440: '2K',
          1080: '1080P',
          720: '720P',
          480: '480P',
          360: '360P'
        }
      },
      // 💬 提示框设置
      tooltips: { controls: true, seek: true },
      // ⌨️ 键盘快捷键
      keyboard: { focused: true, global: true },
      // 🖱️ 点击播放
      clickToPlay: true,
      // 👻 自动隐藏控制栏
      hideControls: true,
      // 🔄 播放结束重置
      resetOnEnd: false,
      // ⏱️ 时间显示格式
      invertTime: true,
      toggleInvert: true,
      displayDuration: true,
      // 🖥️ 全屏设置
      fullscreen: { enabled: true, fallback: true, iosNative: false }
    });
  }
</script>

<style>
  /* 🎨 Plyr 自定义主题 - 圆润圆角风格 */

  /* 📦 视频容器 */
  .tk-local-video-container {
    margin: 24px 0;
  }

  /* 🎨 视频包装器 - 圆角阴影 */
  .tk-local-video-container .tk-video-wrapper {
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  /* 🎨 Plyr CSS 变量 - 主题色 */
  .tk-local-video-container {
    --plyr-color-main: #4ecdc4;
    --plyr-video-control-color: #ffffff;
    --plyr-video-control-color-hover: #ffffff;
    --plyr-video-control-background-hover: rgba(78, 205, 196, 0.8);
    --plyr-video-progress-buffered-background: rgba(255, 255, 255, 0.3);
    --plyr-range-fill-background: linear-gradient(90deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
    --plyr-tooltip-background: rgba(0, 0, 0, 0.8);
    --plyr-tooltip-color: #ffffff;
    --plyr-menu-background: rgba(0, 0, 0, 0.9);
    --plyr-menu-color: #ffffff;
    --plyr-control-radius: 12px;
  }

  /* 🔘 控制按钮 - 圆润风格 */
  .tk-local-video-container .plyr__control {
    border-radius: 12px;
    transition: all 0.2s ease;
  }

  .tk-local-video-container .plyr__control:hover {
    border-radius: 14px;
    transform: scale(1.05);
  }

  /* 📊 进度条样式 */
  .tk-local-video-container .plyr__progress__buffer {
    border-radius: 4px;
  }

  .tk-local-video-container .plyr__progress input[type="range"] {
    border-radius: 4px;
  }

  /* 🔊 音量滑块 */
  .tk-local-video-container .plyr__volume input[type="range"] {
    border-radius: 4px;
  }

  /* 📋 设置菜单 - 毛玻璃效果 */
  .tk-local-video-container .plyr__menu__container {
    border-radius: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .tk-local-video-container .plyr__menu__container .plyr__control {
    border-radius: 8px;
  }

  /* 💬 提示框样式 */
  .tk-local-video-container .plyr__tooltip {
    border-radius: 10px;
    font-size: 13px;
    padding: 8px 12px;
  }

  /* ▶️ 大播放按钮 - 渐变圆角 */
  .tk-local-video-container .plyr__control--overlaid {
    background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 100%);
    border-radius: 28px;
    width: 88px;
    height: 88px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .tk-local-video-container .plyr__control--overlaid:hover {
    border-radius: 32px;
    transform: scale(1.08);
    box-shadow: 0 12px 40px rgba(78, 205, 196, 0.5);
  }

  .tk-local-video-container .plyr__control--overlaid svg {
    width: 36px;
    height: 36px;
    margin-left: 4px;
  }

  /* 📋 菜单项 - 圆角 */
  .tk-local-video-container .plyr__menu__container [role="menuitem"] {
    border-radius: 8px;
    margin: 4px 8px;
    transition: all 0.2s ease;
  }

  .tk-local-video-container .plyr__menu__container [role="menuitem"]:hover {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
  }

  /* 📱 移动端适配 */
  @media (max-width: 768px) {
    .tk-local-video-container .tk-video-wrapper {
      border-radius: 20px;
    }

    .tk-local-video-container .plyr__control--overlaid {
      width: 68px;
      height: 68px;
      border-radius: 22px;
    }

    .tk-local-video-container .plyr__control--overlaid svg {
      width: 28px;
      height: 28px;
    }

    .tk-local-video-container .plyr__control {
      border-radius: 10px;
    }

    .tk-local-video-container .plyr__menu__container {
      border-radius: 12px;
    }
  }
</style>
