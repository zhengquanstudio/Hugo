  - url: "https://img.xxdevops.cn/blog/article_cover/photo-1618005198919-d3d4b5a92ead.webp"
    alt: "自然风光 1"
    description: "山峦与云海"

  - url: "https://img.xxdevops.cn/blog/article_cover/photo-1618005182384-a83a8bd57fbe.webp"
    alt: "自然风光 2"
    description: "壮丽山川"

  - url: "https://img.xxdevops.cn/blog/article_cover/photo-1614850523459-c2f4c699c52e.webp"
