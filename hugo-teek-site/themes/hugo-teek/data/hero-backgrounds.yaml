# 响应式图片配置
responsive:
  # 移动端（<768px）
  mobile:
    width: 1080
    height: 720
    quality: 75
    format: "webp"

  # 平板端（768-1024px）
  tablet:
    width: 1440
    height: 810
    quality: 80
    format: "webp"

  # 桌面端（>1024px）
  desktop:
    width: 1920
    height: 1080
    quality: 85
    format: "webp"

# 占位符配置（首屏瞬间显示，LCP 优化）
placeholder:
  type: "gradient"  # gradient | color | image
  colors:
    - "#1a1a2e"  # 深蓝色
    - "#16213e"  # 偏紫蓝色
  angle: 135  # 渐变角度

# CDN 参数模板
cdn:
  # 图片处理参数（适配 img.xxdevops.cn）
  params:
    width: "w"      # 宽度参数名
    height: "h"     # 高度参数名
    quality: "q"    # 质量参数名
    format: "fm"    # 格式参数名
    fit: "fit"      # 裁剪模式
