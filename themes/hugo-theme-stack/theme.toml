# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name        = "Stack"
license     = "GPL-3.0-only"
licenselink = "https://github.com/CaiJimmy/hugo-theme-stack/blob/master/LICENSE"
description = "欲买桂花同载酒 终不似 少年游"
homepage    = "https://github.com/zhengquanstudio/hugo"
demosite    = "https://zhengquan.org.cn"

tags = ["blog", "responsive", "clean", "light", "dark", "personal"]

features = [
    "disqus",
    "photoswipe",
    "opengraph",
    "widgets",
    "darkmode",
    "table of contents",
    "search",
]

min_version = "0.157.0"

[author]
    name     = "QUAN ZI"
    homepage = "https://zhengquan.org.cn"
