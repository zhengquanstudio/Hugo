# 云存储配置
# 此文件用于配置云存储服务，支持上传图片/视频到云存储并获取 CDN 链接

[cloudStorage]
  # 是否启用云存储功能
  enabled = true

  # 最大上传文件大小（MB）
  maxUploadSize = 10

  # 支持的文件类型
  allowedTypes = ["image/jpeg", "image/png", "image/gif", "image/webp", "video/mp4", "video/webm"]

# 云存储配置存储在 data/cloud-storage/configs.json 中
# 通过配置中心 UI 管理，无需手动编辑

# 示例配置结构（仅供参考，实际配置通过 UI 管理）：
#
# 阿里云 OSS:
# {
#   "name": "我的 OSS",
#   "provider": "aliyun_oss",
#   "isDefault": true,
#   "enabled": true,
#   "aliyunOss": {
#     "accessKeyId": "your-access-key-id",
#     "accessKeySecret": "your-access-key-secret",
#     "bucket": "your-bucket-name",
#     "region": "oss-cn-hangzhou",
#     "customDomain": "cdn.example.com",
#     "pathPrefix": "blog/images"
#   }
# }
#
# 腾讯云 COS:
# {
#   "name": "我的 COS",
#   "provider": "tencent_cos",
#   "tencentCos": {
#     "secretId": "your-secret-id",
#     "secretKey": "your-secret-key",
#     "bucket": "bucket-1234567890",
#     "region": "ap-guangzhou"
#   }
# }
#
# 七牛云:
# {
#   "name": "七牛图床",
#   "provider": "qiniu",
#   "qiniu": {
#     "accessKey": "your-access-key",
#     "secretKey": "your-secret-key",
#     "bucket": "your-bucket",
#     "domain": "cdn.example.com",
#     "region": "z0"
#   }
# }
