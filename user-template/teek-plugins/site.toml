# ========================================
# 站点基础配置 (Site Configuration)
# ========================================
# 本文件包含所有主题共享的站点基础信息。
# 这些配置与具体主题UI无关，属于站点内容层的元数据。
#
# 配置范围 (Scope):
#   - 站点核心配置（URL、标题、主题）
#   - 站点描述和 SEO 信息
#   - 站点启动日期
#   - 默认封面图片
#   - 主要内容分区
#
# 注意事项:
#   - 修改后需运行 'make dev' 或 'make build' 自动合并
#   - 主题可以覆盖这些配置（通过主题目录下的配置文件）
# ========================================

[params]
  # ========================================
  # 站点元信息 (Site Metadata)
  # ========================================
  # 站点描述（用于 SEO 和 meta 标签）
  description = "我的技术博客，分享技术知识与经验"

  # 站点关键词（用于 SEO）
  keywords = ["技术博客", "DevOps", "Linux", "Docker", "Kubernetes", "前端开发", "编程"]

  # 站点启动日期（用于统计和展示）
  siteStartDate = "2024-01-01"

  # 默认封面图片（当文章未指定封面时使用）
  defaultCoverImage = ""

  # 主要内容类型（首页显示的 section）
  mainSections = ["docs"]
