baseURL = "https://www.zhengquan.org.cn"
title = "全溪小筑のBLOG"
theme = "hugo-theme-stack"
locale = "zh-CN"
[markup.goldmark.renderer]
unsafe = true

[build]
  writeStats = false
  ignoreErrors = ["error-date"]

# 重写永久链接（Permalinks）
#[permalinks]

#  post = "/:sections[1]/:contentbasename/"

[params]
  dateFormat = "2006-01-02"
  [params.comments]
  enabled = true
  provider = "twikoo"
    [params.comments.twikoo]
    envId = "https://twikoo.langya.org.cn"
  
  mainSections = ["posts", "blog", "article"]


[frontmatter]
  date = ["date", "publishDate", "lastmod"]


